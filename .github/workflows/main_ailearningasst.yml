# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - ailearningasst

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: 'ubuntu-latest'

    steps:
    - uses: actions/checkout@v2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Log in to registry
      uses: docker/login-action@v2
      with:
        registry: https://ailearningasst.azurecr.io/
        username: ${{ secrets.AzureAppService_ContainerUsername_887b36c3e9614573b408b26c503ea6f0 }}
        password: ${{ secrets.AzureAppService_ContainerPassword_6f892e8ac19342548a595d2ce775baab }}

    - name: Build and push container image to registry
      uses: docker/build-push-action@v3
      with:
        push: true
        tags: ailearningasst.azurecr.io/${{ secrets.AzureAppService_ContainerUsername_887b36c3e9614573b408b26c503ea6f0 }}/ai-learning-assistant:${{ github.sha }}
        file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
    - name: Deploy to Azure Web App
      id: deploy-to-webapp
      uses: azure/webapps-deploy@v2
      with:
        app-name: 'ailearningasst'
        slot-name: 'production'
        publish-profile: ${{ secrets.AzureAppService_PublishProfile_dd8effc118194eabb92bf3bb8e22d323 }}
        images: 'ailearningasst.azurecr.io/${{ secrets.AzureAppService_ContainerUsername_887b36c3e9614573b408b26c503ea6f0 }}/ai-learning-assistant:${{ github.sha }}'